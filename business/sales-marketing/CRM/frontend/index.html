<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="TheGrantScout Sales CRM">
    <title>TGS CRM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
    <!-- Navigation - 4 core items -->
    <nav class="nav-bar">
        <button class="nav-btn" data-view="queue" aria-label="Calls">
            <span class="nav-icon">&#128222;</span>
            <span class="nav-label">Calls</span>
        </button>
        <button class="nav-btn" data-view="campaigns" aria-label="Email Campaign">
            <span class="nav-icon">&#128231;</span>
            <span class="nav-label">Email</span>
        </button>
        <button class="nav-btn" data-view="prospects" aria-label="Prospects">
            <span class="nav-icon">&#128203;</span>
            <span class="nav-label">Prospects</span>
        </button>
        <button class="nav-btn" data-view="dashboard" aria-label="Dashboard">
            <span class="nav-icon">&#128202;</span>
            <span class="nav-label">Dashboard</span>
        </button>
    </nav>

    <!-- App Header with Logo and Motivation -->
    <header class="app-header">
        <img src="/icons/logo.png" alt="TheGrantScout" class="app-logo">
        <div class="app-motivation">Alec, you get to build the life you want.</div>
    </header>

    <!-- Main Content Area -->
    <main id="app">
        <!-- Views loaded dynamically -->
    </main>

    <!-- Log Call Modal -->
    <div id="log-call-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('log-call-modal')">&larr;</button>
                <h2>Log Call</h2>
            </header>
            <div id="log-call-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Log Email Modal -->
    <div id="log-email-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('log-email-modal')">&larr;</button>
                <h2>Log Email</h2>
            </header>
            <div id="log-email-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Prospect Detail Modal -->
    <div id="prospect-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('prospect-modal')">&larr;</button>
                <h2>Prospect</h2>
                <div class="prospect-nav-btns">
                    <button class="btn-icon" id="prev-prospect-btn" title="Previous" disabled>&lsaquo;</button>
                    <button class="btn-icon" id="next-prospect-btn" title="Next" disabled>&rsaquo;</button>
                </div>
            </header>
            <div id="prospect-detail-container">
                <!-- Detail injected by JS -->
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="add-task-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('add-task-modal')">&larr;</button>
                <h2>Add Task</h2>
            </header>
            <div id="add-task-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Schedule Call Modal -->
    <div id="schedule-call-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('schedule-call-modal')">&larr;</button>
                <h2>Schedule Call</h2>
            </header>
            <div id="schedule-call-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Clock In Modal -->
    <div id="clock-in-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('clock-in-modal')">&larr;</button>
                <h2>Clock In</h2>
            </header>
            <div id="clock-in-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Clock Out Modal -->
    <div id="clock-out-modal" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <button class="back-btn" onclick="closeModal('clock-out-modal')">&larr;</button>
                <h2>Clock Out</h2>
            </header>
            <div id="clock-out-form-container">
                <!-- Form injected by JS -->
            </div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>

    <!-- Loading overlay -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/queue.js"></script>
    <script src="js/views/prospects.js"></script>
    <script src="js/views/import.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/prospect.js"></script>
    <script src="js/views/log-call.js"></script>
    <script src="js/views/log-email.js"></script>
    <script src="js/views/schedule-call.js"></script>
    <script src="js/views/timer.js"></script>
    <script src="js/views/campaigns.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
